<!-- Básico do html  -->
<!DOCTYPE html>
<!-- Idioma -->
<html lang="pt-BR">

<!-- Configurações -->
<head>
    <meta charset="UTF-8">
    <!-- Permite caracteres especiais -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Título da página -->
    <title>Coleta Fácil - Login</title>
    <!-- Link com o css -->
    <link rel="stylesheet" href="css/style.css">
<!-- Fecha as configurações -->
</head>

<!-- Começa a parte visível do código -->
<body>

<!-- Inicia a classe "container" -->
<div class="container">
    <!-- Menu de navegação -->
    <nav class="menu">
        <!-- Link para a tela inicial -->
        <a href="01-index.html">Início</a>
        <!-- Link para o calendário de coleta -->
        <a href="02-calendario.html">Calendário</a>
        <!-- Link para a tela de conscientização -->
        <a href="03-dicas.html">Dicas</a>
        <!-- Link para a tela de comentários -->
        <a href="04-comentarios.html">Comentários</a>
        <!-- Link para o perfil de usuário -->
        <a href="05-perfil.html">Perfil</a>
    <!-- Fecha o menu -->
    </nav>

    <!-- Inicia a classe "card" -->
    <section class="card">
        <!-- Título da seção -->
        <h2>Login do Usuário</h2>

        <!-- Formulário -->
        <form>
            <!-- Campo para inserir o nome -->
            <label>Nome completo</label>
            <input type="text" placeholder="Digite seu nome completo" required>

            <!-- Campo para inserir o email -->
            <label>Email cadastrado</label>
            <input type="email" placeholder="Digite seu email" required>

            <!-- Campo para inserir a senha -->
            <!-- type="email" já valida o formato automaticamente -->
            <!-- minlength="6" garante senha com pelo menos 6 caracteres -->
            <!-- required impede o envio vazio -->
            <label>Senha</label>
            <input type="password" placeholder="Mínimo 6 caracteres" minlength="6" required>

            <!-- Botão -->
            <button type="submit">Entrar</button>
        <!-- Fecha o formulário -->
        </form>

        <!-- Inicia a classe "info" -->
        <div class="info">
            <!-- Texto informativo -->
            <p><strong>Atenção:</strong> o email deve já estar cadastrado no sistema.</p>
        </div>
    <!-- Fecha a seção-->
    </section>

<!-- Final da página -->
</div>
</body>
</html>
