<!-- Básico do html -->
<!DOCTYPE html>
<!-- Idioma -->
<html lang="pt-BR">

<!-- Configurações -->
<head>
    <meta charset="UTF-8">
    <!-- Permite caracteres especiais -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Título da página -->
    <title>Coleta Fácil - Cadastro</title>
    <!-- Link para o css -->
    <link rel="stylesheet" href="css/style.css">
<!-- Fecha as configurações -->
</head>

<!-- Inicia a parte visível do código -->
<body>

<!-- Inicia a classe "container" -->
<div class="container">

    <!-- Menu de navegação -->
    <nav class="menu">
        <!-- Tela de início -->
        <a href="01-index.html">Início</a>
        <!-- Tela de calendário de coleta -->
        <a href="02-calendario.html">Calendário</a>
        <!-- Tela de conscientização -->
        <a href="03-dicas.html">Dicas</a>
        <!-- Tela de comentários -->
        <a href="04-comentarios.html">Comentários</a>
        <!-- Tela de perfil de usuário -->
        <a href="05-perfil.html">Perfil</a>
    <!-- Fecha o menu -->
    </nav>

    <!-- Inicia a classe "card" -->
    <section class="card">
        <!-- Título da seção -->
        <h2>Cadastro de Usuário</h2>

        <!-- Formulário -->
        <form>
            <!-- Campo para inserir o nome -->
            <label>Nome</label>
            <input type="text" placeholder="Digite seu nome" required>

            <!-- Campo para inserir o sobrenome -->
            <label>Sobrenome</label>
            <input type="text" placeholder="Digite seu sobrenome" required>

            <!-- Campo para inserir o email -->
            <label>Email</label>
            <input type="email" placeholder="Digite seu email" required>

            <!-- Campo para inserir o endereço -->
            <label>Endereço</label>
            <input type="text" placeholder="Rua, número..." required>

            <!-- Campo para selecionar a cidade -->
            <label>Cidade</label>
            <select required>
                <option value="">Selecione</option>
                <option>Irati - PR</option>
                <option>Imbituva - PR</option>
            </select>

            <!-- Campo para selecionar o bairro -->
            <label>Bairro</label>
            <select required>
                <option value="">Selecione</option>

                <!-- Bairros de Irati -->
                <option>Centro - Irati</option>
                <option>Alto da Lagoa - Irati</option>
                <option>Rio Bonito - Irati</option>

                <!-- Bairros de Imbituva -->
                <option>Centro - Imbituva</option>
                <option>Vila Nova - Imbituva</option>
                <option>Bela Vista - Imbituva</option>
            </select>

            <!-- Campo para inserir a senha -->
            <label>Senha</label>
            <input type="password" placeholder="Mínimo 6 caracteres" minlength="6" required>

            <!-- Campo para confirmar a senha -->
            <label>Confirmar senha</label>
            <input type="password" placeholder="Digite a senha novamente" minlength="6" required>

            <!-- Botão para cadastrar -->
            <button type="submit">Cadastrar</button>
        <!-- Formulário -->
        </form>

        <!-- Inicia a classe "informação" -->
        <div class="info">
            <!-- Texto informativo -->
            <p><strong>Observação:</strong> após o cadastro, utilize seu email e senha para fazer login.</p>
        </div>
    <!-- Fecha a seção -->
    </section>

<!-- Final da página -->
</div>
</body>
</html>
